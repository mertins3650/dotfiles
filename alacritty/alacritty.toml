import = [ "~/.config/alacritty/theme.toml",
    "~/.config/alacritty/font.toml",
    "~/.config/alacritty/font-size.toml",]

[env]
TERM = "xterm-256color"

[shell]
program = "zellij"

[window]
padding.x = 5
padding.y = 5
decorations = "None"
opacity = 0.98

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" }
]
